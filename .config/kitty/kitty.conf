# font
font_family JetBrainsMono Nerd Font
font_size 12.0

# background
background_opacity 0.92
background #0e1016
foreground #e6e6e6

# shell
shell /usr/bin/zsh
copy_on_select yes

# spacing
window_padding_width 6

# colors
color8  #a8a8a8
color7  #cfcfcf
color15 #ffffff
color6  #8bd5ca
color3  #f5c26b
color1  #ff6b6b

# cursor
cursor_shape beam
cursor #8bd5ca
cursor_text_color #0e1016

# selection
selection_background #8bd5ca
selection_foreground #0e1016

# tabs
tab_bar_edge none